<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Gomoku Game</title>
  <style>
    body {
      background-color: #09223c;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    table {
      border-collapse: collapse;
      margin: 20px auto;
      background-color: whitesmoke;
    }
    td {
      width: 30px;
      height: 30px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #969696;
      font-size: 20px;
    }
    .player1 {
      color: red;
    }
    .player2 {
      color: blue;
    }
    h1 {
      color: #09223c;
      text-align: center;
    }
    .title {
      background-color: #CDDC28;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    h2 {
      color: #ffffff;
      text-align: center;
    }

    /* —— Time Bar Styles —— */
    #time-bar-container {
      width: 80%;
      max-width: 400px;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin: 10px auto;
    }
    #time-bar {
      width: 0%;
      height: 100%;
      background: #76c7c0;
      transition: width 0.3s ease-out;
    }
    #move-time {
      display: block;
      text-align: center;
      color: #fff;
      font-size: 0.9em;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="title">
    <h1>AI_STUDIO FINAL ASSESSMENT</h1>
  </div>

  <div id="team-info">
    <h2>Player 1: {{ team_info.player1.name }} ({{ team_info.player1.symbol }})</h2>
    <h2>Player 2: {{ team_info.player2.name }} ({{ team_info.player2.symbol }})</h2>
  </div>

  <!-- empty spacing -->
  <div style="height:40px;"></div>

  <!-- Gomoku board -->
  <table id="gomoku-board"></table>

  <!-- Time bar + label -->
  <div id="time-bar-container">
    <div id="time-bar"></div>
  </div>
  <div id="move-time">Last move: – ms</div>

  <script>
    const MAX_EXPECT = 2000; // 2 seconds = 100% bar

    function updateBoard(board) {
      const table = document.getElementById('gomoku-board');
      table.innerHTML = '';
      for (let i = 0; i < board.length; i++) {
        const row = document.createElement('tr');
        for (let j = 0; j < board[i].length; j++) {
          const cell = document.createElement('td');
          if (board[i][j] === 1) {
            cell.textContent = 'X';
            cell.classList.add('player1');
          } else if (board[i][j] === 2) {
            cell.textContent = 'O';
            cell.classList.add('player2');
          }
          row.appendChild(cell);
        }
        table.appendChild(row);
      }
    }

    function fetchBoard() {
      fetch('/get_board')
        .then(res => res.json())
        .then(board => updateBoard(board));
    }

    function playTurn() {
      // start timer
      const t0 = performance.now();

      fetch('/play_turn')
        .then(res => res.json())
        .then(data => {
          // compute elapsed
          const elapsed = performance.now() - t0;
          const ms = Math.round(elapsed);

          // update time label
          document.getElementById('move-time').textContent =
            `Last move: ${ms} ms`;

          // update bar width (clamped 0–100%)
          const pct = Math.min((elapsed / MAX_EXPECT) * 100, 100);
          document.getElementById('time-bar').style.width = pct + '%';

          // update board
          updateBoard(data.board);

          // handle winner or next turn
          if (data.winner !== null) {
            setTimeout(() => {
              const winnerName = data.winner === 1
                ? '{{ team_info.player1.name }}'
                : '{{ team_info.player2.name }}';
              alert(`Player ${winnerName} wins!`);
            }, 100);
          } else {
            // next turn in 1s
            setTimeout(playTurn, 1000);
          }
        });
    }

    // initial load
    fetchBoard();
    playTurn();
  </script>
</body>
</html>
